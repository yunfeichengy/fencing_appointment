<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book an Appointment – Minato Fencing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .logo {
    width: 180px;
    margin-bottom: 1.5rem;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  h1 {
    font-size: 1.2rem;
    font-weight: 500;
    color: #ccc;
    margin-bottom: 2rem;
    text-align: center;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    max-width: 900px;
    width: 100%;
  }

  .card {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    text-align: center;
    transition: border-color 0.2s;
  }

  .card:hover {
    border-color: #444;
  }

  .avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #222;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 600;
    color: #fff;
  }

  .card-name {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
  }

  .card-role {
    font-size: 0.78rem;
    color: #666;
    margin-top: 0.2rem;
  }

  .btn {
    display: inline-block;
    padding: 0.55rem 1.25rem;
    background: #fff;
    color: #000;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }

  .btn:hover {
    background: #ddd;
  }

  .btn-disabled {
    background: #1e1e1e;
    color: #444;
    cursor: not-allowed;
    pointer-events: none;
    border: 1px solid #2a2a2a;
  }
</style>
</head>
<body>

  <img class="logo" src="whiteOnBlack.png" alt="Minato Fencing">

  <h1>Book a Private Lesson</h1>

  <div class="cards">

    <!-- Card 1: タカミツ -->
    <div class="card">
      <div class="avatar">TK</div>
      <div>
        <div class="card-name">Coach TaKamitsu</div>
        <div class="card-role">Head Coach</div>
      </div>
      <span class="btn btn-disabled">Unavailable</span>
    </div>

    <!-- Card 2: ウンヒ -->
    <div class="card">
      <div class="avatar">P</div>
      <div>
        <div class="card-name">Coach Phil</div>
        <div class="card-role">Coach</div>
      </div>
      <a class="btn" href="https://calendar.app.google/ngJEsKTyJippG63u6" target="_blank">Book Now</a>
      
    </div>

    <!-- Card 3: リキ -->
    <div class="card">
      <div class="avatar">R</div>
      <div>
        <div class="card-name">Coach Riki</div>
        <div class="card-role">Coach</div>
      </div>
      <a class="btn" href="https://calendar.app.google/ke6dPL4tWE2vzGyA7" target="_blank">Book Now</a>
     
    </div>

    <!-- Card 4: クラチ -->
    <div class="card">
      <div class="avatar">K</div>
      <div>
        <div class="card-name">Coach Kurachi</div>
        <div class="card-role">Coach</div>
      </div>
      <span class="btn btn-disabled">Unavailable</span>
    </div>

  </div>

</body>
</html>
